name: vox_guard
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0         
  latlong2: ^0.9.0            
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.0
  intl_phone_field: ^3.2.0
  permission_handler: ^11.3.1
  http: ^1.6.0
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.4
  geocoding: ^4.0.0
  image_picker: ^1.2.1
  audioplayers: ^5.2.1
  dio: ^5.9.2
  flutter_facebook_auth: ^7.1.1
  google_sign_in: ^6.2.1
  path: ^1.9.1
  path_provider: ^2.1.5
  record: ^6.2.0
  file_picker: ^11.0.2
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^20.1.0
  wakelock_plus: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - images/
    - assets/audio/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/logo.png"
  remove_alpha_ios: true